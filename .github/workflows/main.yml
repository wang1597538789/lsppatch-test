name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 必须添加写入权限，否则 Action 没有权限在你主页创建 Release
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # (可选) 你可以保留这个 Artifact 步骤作为备份，也可以删掉
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 新增：直接将生成的 APK 发布到主页 Release
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        # 为了避免 Pull Request 也生成 Release，限制只在推送到主分支或手动触发时执行
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          # 自动使用 GitHub 运行的次数作为版本号，例如 v15, v16
          tag_name: "v${{ github.run_number }}"
          # Release 的标题
          name: "Dev Build v${{ github.run_number }}"
          # Release 的文字说明
          body: "这是由 GitHub Actions 自动打包的最新测试版本。"
          # 指向你要上传的文件路径（直接上传 APK，而不是 zip）
          files: app/build/outputs/apk/debug/*.apk
