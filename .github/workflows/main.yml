name: Build Android App

# 配置触发条件
on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行环境

    steps:
      # 1. 检出仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (通常 Android 开发使用 JDK 11 或 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 自动缓存 Gradle 依赖，加快后续编译速度

      # 3. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行 Gradle 打包命令 (生成 Debug 版本的 APK)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. 提取并上传生成的 APK 文件
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk # 修改了 Artifact 名称
          path: app/build/outputs/apk/debug/*.apk # 修改了这里的路径为 debug
